name: CI/CD Pipeline

on:
  push:
    branches: [main, '**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Cache npm
        id: cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - run: npm ci
      - run: npx oxlint@latest .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - run: npm ci
      - run: npx tsc -b

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - run: npm ci
      - run: npx vitest run --reporter=verbose

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request' || github.ref_name == 'main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - run: npm ci
      - name: Dependency audit
        run: npm audit --audit-level=high
        continue-on-error: true

  deploy-production:
    name: Deploy Production
    runs-on: [self-hosted, windows]
    needs: [security]
    if: github.ref_name == 'main' && github.event_name == 'push'
    environment:
      name: production
      url: https://records.barangay.gov.ph
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Deploy to server
        shell: powershell
        run: |
          $ProjectRoot = "D:\BARANGAYCC\barangay-system"
          $ErrorActionPreference = "Stop"
          Write-Host "Pulling latest code..."
          Set-Location -LiteralPath $ProjectRoot
          git pull origin main
          Write-Host "Cleaning node_modules to avoid file lock issues..."
          Remove-Item -LiteralPath "$ProjectRoot\node_modules" -Recurse -Force -ErrorAction SilentlyContinue
          Write-Host "Installing dependencies..."
          npm ci
          Write-Host "Copying built artifacts to pb_public..."
          Copy-Item -Path "$(Get-Location)\dist\*" -Destination "$ProjectRoot\pb_public\" -Recurse -Force
          Write-Host "Restarting PocketBase..."
          Restart-Service -Name PocketBase -Force
      - name: Health check
        shell: powershell
        run: |
          Start-Sleep -Seconds 5
          $response = Invoke-RestMethod -Uri "http://localhost:8090/api/health" -ErrorAction SilentlyContinue
          if ($response.code -ne 200) {
            Write-Error "Health check failed: $($response | ConvertTo-Json)"
            exit 1
          }
          Write-Host "PocketBase is healthy."
