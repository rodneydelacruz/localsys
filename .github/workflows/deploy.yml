name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build -- --mode production

      - name: Copy to pb_public
        run: Copy-Item -Path "dist\*" -Destination "pb_public\" -Recurse -Force

      - name: Restart PocketBase
        run: Restart-Service -Name PocketBase -Force
